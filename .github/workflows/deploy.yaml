name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: "Whether to deploy up or down"
        required: true
        default: "up"
        type: choice
        options:
          - up
          - down
      stack:
        description: "The stack to deploy up or down. (Leave blank for default)"
        default: ""

jobs:
  defang:
    name: Defang ${{ github.event.inputs.action || 'up' }} ${{
      github.event.inputs.stack || 'default stack' }}
    environment: production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    concurrency:
      cancel-in-progress: false
      group: deploy-${{ github.event.inputs.stack || 'default' }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download defang binary
        run: |
          gh release download testoidcnocgo --repo edwardrf/testactions --pattern defang
          chmod +x defang
          ls -lah
          echo $ACTIONS_ID_TOKEN_REQUEST_URL
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
      - name: Defang login
        run: |
          ls -la defang
          ./defang login --debug
          echo "########################################"
          ./defang whoami --debug
          echo "########################################"
          ./defang cd ls --stack=production --debug

